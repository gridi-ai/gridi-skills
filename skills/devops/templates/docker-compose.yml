# Docker Compose Template
# DevOps Skill - Modify to fit your project

version: '3.8'

services:
  # ============================================
  # Backend API (Node.js/NestJS)
  # ============================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: app-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PYTHON_SERVICE_URL=http://python-service:8001
    depends_on:
      python-service:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Python Microservice
  # ============================================
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: app-python-service
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Frontend (Next.js) - Optional
  # ============================================
